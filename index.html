<script type="module">
    // --- FIREBASE INTEGRATION ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const myFirebaseConfig = {
        apiKey: "AIzaSyCxAvUTITjaUV9-rihQL4Nvbdp_AAuy0eM",
        authDomain: "aftkad-mary-grges.firebaseapp.com",
        projectId: "aftkad-mary-grges",
        storageBucket: "aftkad-mary-grges.firebasestorage.app",
        messagingSenderId: "654893324001",
        appId: "1:654893324001:web:628c81c048b1376e6389a0"
    };

    const app = initializeApp(myFirebaseConfig);
    const db = getFirestore(app);

    // --- State ---
    const STORE_PREFIX = 'aloriginal_store_';
    let products = JSON.parse(localStorage.getItem(STORE_PREFIX + 'products')) || [];
    let cart = JSON.parse(localStorage.getItem(STORE_PREFIX + 'cart')) || [];
    
    // ربط البيانات بالسحابة (مثال بسيط لمزامنة المنتجات)
    async function syncProductsToCloud(updatedProducts) {
        try {
            await setDoc(doc(collection(db, "stores"), "aloriginal_data"), {
                products: updatedProducts,
                lastUpdated: Date.now()
            });
        } catch (e) {
            console.error("Error syncing to Firebase: ", e);
        }
    }

    // ملاحظة: يمكنك استدعاء syncProductsToCloud(products) بعد أي عملية تعديل في الدالة saveProduct()

</script>
