<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر Al Original</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div id="app" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-center mb-4">متجر Al Original</h1>
        <div id="content">جاري التحميل...</div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBSGSUiIEAmOHjZLBoF6sWENW_XuSLkpVU",
            authDomain: "mohammed-apdo.firebaseapp.com",
            projectId: "mohammed-apdo",
            storageBucket: "mohammed-apdo.firebasestorage.app",
            messagingSenderId: "605866837238",
            appId: "1:605866837238:web:a780e6948a8cb6faed18d7"
        };

        // الربط
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // تجربة سريعة للتحقق من الربط
        db.collection("test").doc("connection").set({
            status: "connected",
            timestamp: new Date()
        }).then(() => {
            document.getElementById('content').innerHTML = "تم الربط مع Firebase بنجاح! 🎉";
        }).catch((error) => {
            document.getElementById('content').innerHTML = "خطأ في الربط: " + error.message;
        });
    </script>
</body>
</html>
